apis: []
common:
  - type: Website
    url: https://cemanet.org
    title: CEMA - Conveyor Equipment Manufacturers Association
  - type: Website
    url: https://webstore.ansi.org/industry/conveyors/belt-standards
    title: ANSI Conveyor Belt Standards
  - type: Documentation
    url: https://cemanet.org/resources/publications/
    title: CEMA Publications and Standards
  - type: Features
    data:
      - name: Conveyor Belt Standards
        description: >-
          CEMA and ANSI standards define over 1,500 terms for conveyors, conveyor
          systems, and allied equipment, covering design, installation, safety codes,
          dimensions, test methods, and performance characteristics for belt conveyors.
      - name: Belt Condition Monitoring
        description: >-
          Industrial IoT sensor systems monitor conveyor belt condition in real time,
          tracking parameters such as tension, speed, temperature, alignment, and
          wear to enable predictive maintenance and prevent unplanned downtime.
      - name: CEMA Design Standards
        description: >-
          ANSI/CEMA Standard No. 402 and related standards establish recommended
          design and application engineering practices for unit handling and bulk
          material belt conveyors in mining, food processing, and manufacturing.
      - name: Industrial Sensor Integration
        description: >-
          Conveyor belt monitoring systems integrate with industrial sensors via
          OPC UA, MQTT, and REST APIs to stream belt health data to SCADA, MES,
          and cloud analytics platforms.
      - name: Predictive Maintenance APIs
        description: >-
          Cloud-based predictive maintenance platforms offer APIs for ingesting
          conveyor belt sensor data, running ML-based failure prediction models,
          and generating maintenance work orders.
  - type: UseCases
    data:
      - name: Mining and Bulk Material Transport
        description: >-
          Conveyor belt systems transport coal, ore, aggregates, and other bulk
          materials in mining operations, with API integrations for production
          monitoring and material tracking.
      - name: Food Processing and Packaging
        description: >-
          Food-grade conveyor belt systems in processing and packaging facilities
          require sanitation compliance tracking and production throughput monitoring
          via SCADA and MES integrations.
      - name: Manufacturing Line Automation
        description: >-
          Assembly line conveyor belts integrate with manufacturing execution systems
          and robotics via industrial protocols to coordinate production flow and
          quality inspection.
      - name: Predictive Maintenance
        description: >-
          IoT-enabled belt monitoring systems detect early signs of wear, misalignment,
          and overheating, triggering maintenance alerts and work orders through
          connected CMMS platforms.
      - name: Logistics and Distribution
        description: >-
          Sortation conveyors in warehouses and distribution centers integrate with
          warehouse management systems via API to route packages and track throughput.
  - type: Integrations
    data:
      - name: OPC UA
        description: >-
          OPC UA is the primary industrial interoperability standard for conveyor
          belt control systems, enabling real-time data exchange between belt
          controllers, SCADA, and enterprise systems.
      - name: MQTT
        description: >-
          MQTT protocol is used for lightweight sensor data streaming from conveyor
          belt IoT edge devices to cloud-based monitoring and analytics platforms.
      - name: SCADA Systems
        description: >-
          Supervisory Control and Data Acquisition (SCADA) systems integrate with
          conveyor belt PLCs and sensors to provide operational visibility and
          control across industrial facilities.
      - name: CMMS Platforms
        description: >-
          Computerized Maintenance Management Systems receive predictive maintenance
          alerts and automatically generate work orders when belt sensor data
          indicates approaching failure conditions.
